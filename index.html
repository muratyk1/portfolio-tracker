<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Portfolio Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap');

  /* ── DARK THEME (default) ── */
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --accent: #6ee7b7;
    --accent2: #f59e0b;
    --red: #f87171;
    --green: #6ee7b7;
    --text: #e8e8f0;
    --muted: #6b7080;
    --radius: 12px;
    --header-bg: rgba(10,10,15,0.92);
    --table-header-bg: #1a1a24;
    --table-row-alt: #0f0f16;
  }

  /* ── LIGHT THEME ── */
  body.light {
    --bg: #f4f6f9;
    --surface: #ffffff;
    --surface2: #eef1f6;
    --border: #d0d7e3;
    --accent: #059669;
    --accent2: #d97706;
    --red: #dc2626;
    --green: #059669;
    --text: #1a202c;
    --muted: #6b7280;
    --radius: 12px;
    --header-bg: rgba(244,246,249,0.95);
    --table-header-bg: #e8ecf3;
    --table-row-alt: #f8fafc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Roboto', sans-serif;
    min-height: 100dvh;
    overscroll-behavior: none;
    transition: background 0.2s, color 0.2s;
  }

  #app { display: flex; flex-direction: column; min-height: 100dvh; }

  header {
    position: sticky; top: 0; z-index: 100;
    background: var(--header-bg);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px 10px;
    position: relative;
  }
  header h1 { font-size: 1.15rem; font-weight: 700; letter-spacing: -0.01em; }
  header h1 span { color: var(--accent); }

  .header-actions { position: absolute; right: 16px; top: 12px; display: flex; gap: 8px; align-items: center; }
  .icon-btn { background: none; border: none; color: var(--muted); font-size: 1.1rem; cursor: pointer; padding: 4px; line-height: 1; }
  .theme-toggle { font-size: 1rem; }

  .nav-tabs {
    display: flex; gap: 4px; margin-top: 10px;
    background: var(--surface2); border-radius: 8px; padding: 3px;
  }
  .nav-tab {
    flex: 1; padding: 6px 4px; border: none; background: transparent;
    color: var(--muted); font-family: 'Roboto', sans-serif;
    font-size: 0.7rem; font-weight: 500; border-radius: 6px;
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .nav-tab.active { background: var(--surface); color: var(--accent); font-weight: 700; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }

  main { flex: 1; padding: 16px; }

  /* ── OWNER PILLS ── */
  .owner-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .pill {
    padding: 5px 14px; border-radius: 999px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-size: 0.78rem; font-weight: 500; cursor: pointer;
    transition: all 0.15s; font-family: 'Roboto', sans-serif;
  }
  .pill.active { border-color: var(--accent); color: var(--accent); background: rgba(110,231,183,0.08); font-weight: 700; }
  body.light .pill.active { background: rgba(5,150,105,0.08); }

  /* ── CARDS ── */
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
  }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; }
  .stat-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .stat-val { font-size: 1.1rem; font-weight: 700; font-family: 'Roboto Mono', monospace; }

  /* ── COLORS ── */
  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--text); }

  /* ── OWNER TABLE ── */
  .owner-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  .owner-table th {
    background: var(--table-header-bg); color: var(--muted);
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; padding: 8px 10px; text-align: right;
    border-bottom: 2px solid var(--border);
  }
  .owner-table th:first-child { text-align: left; border-radius: 8px 0 0 0; }
  .owner-table th:last-child { border-radius: 0 8px 0 0; }
  .owner-table td {
    padding: 9px 10px; text-align: right; border-bottom: 1px solid var(--border);
    font-family: 'Roboto Mono', monospace; font-size: 0.82rem; font-weight: 500;
  }
  .owner-table td:first-child { text-align: left; font-family: 'Roboto', sans-serif; font-weight: 600; font-size: 0.85rem; }
  .owner-table tr:last-child td { border-bottom: none; }
  .owner-table tr:nth-child(even) td { background: var(--table-row-alt); }
  .owner-table .total-row td { font-weight: 700; border-top: 2px solid var(--border); background: var(--table-header-bg) !important; }

  /* ── STOCK CARDS ── */
  .stock-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 8px; transition: border-color 0.15s;
  }
  .stock-item:active { border-color: var(--accent); }
  .stock-top { display: flex; justify-content: space-between; align-items: center; }
  .stock-name { font-size: 0.95rem; font-weight: 700; letter-spacing: 0.03em; }
  .stock-pnl { font-size: 1rem; font-weight: 700; font-family: 'Roboto Mono', monospace; }
  .stock-detail { margin-top: 8px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
  .sdet { font-size: 0.68rem; color: var(--muted); }
  .sdet span { display: block; color: var(--text); font-family: 'Roboto Mono', monospace; font-size: 0.78rem; font-weight: 500; }

  /* ── TRANSACTIONS ── */
  .tx-item {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 11px 14px; margin-bottom: 8px;
    display: flex; align-items: flex-start; gap: 12px;
  }
  .tx-badge {
    min-width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.62rem; font-weight: 700; letter-spacing: 0.04em; flex-shrink: 0;
  }
  .tx-badge.buy { background: rgba(110,231,183,0.12); color: var(--green); }
  .tx-badge.sell { background: rgba(248,113,113,0.12); color: var(--red); }
  .tx-badge.dep { background: rgba(245,158,11,0.12); color: var(--accent2); }
  .tx-badge.wit { background: rgba(107,112,128,0.15); color: var(--muted); }
  body.light .tx-badge.buy { background: rgba(5,150,105,0.1); }
  .tx-info { flex: 1; min-width: 0; }
  .tx-top { display: flex; justify-content: space-between; align-items: baseline; }
  .tx-name { font-size: 0.88rem; font-weight: 700; }
  .tx-amount { font-size: 0.88rem; font-weight: 700; font-family: 'Roboto Mono', monospace; }
  .tx-meta { font-size: 0.7rem; color: var(--muted); margin-top: 2px; font-family: 'Roboto Mono', monospace; }
  .tx-owners { font-size: 0.67rem; color: var(--muted); margin-top: 3px; }

  /* ── FORM ── */
  .form-section { margin-bottom: 14px; }
  .form-label { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; display: block; }
  .form-input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 12px; color: var(--text);
    font-family: 'Roboto Mono', monospace; font-size: 0.88rem;
    outline: none; transition: border-color 0.15s; -webkit-appearance: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .type-btns { display: flex; gap: 6px; }
  .type-btn {
    flex: 1; padding: 9px 6px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--muted);
    font-family: 'Roboto', sans-serif; font-size: 0.75rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s; text-align: center;
  }
  .type-btn.active-buy { border-color: var(--green); color: var(--green); background: rgba(110,231,183,0.08); font-weight: 700; }
  .type-btn.active-sell { border-color: var(--red); color: var(--red); background: rgba(248,113,113,0.08); font-weight: 700; }
  .type-btn.active-dep { border-color: var(--accent2); color: var(--accent2); background: rgba(245,158,11,0.08); font-weight: 700; }
  .type-btn.active-wit { border-color: var(--muted); color: var(--text); background: rgba(107,112,128,0.1); font-weight: 700; }
  body.light .type-btn.active-buy { background: rgba(5,150,105,0.08); }

  .pct-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .pct-input-wrap { display: flex; align-items: center; gap: 4px; }
  .pct-label { font-size: 0.72rem; color: var(--accent); font-weight: 600; min-width: 48px; font-family: 'Roboto', sans-serif; }
  .pct-input {
    width: 64px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 6px; padding: 5px 8px; color: var(--text);
    font-family: 'Roboto Mono', monospace; font-size: 0.82rem;
    outline: none; -webkit-appearance: none; text-align: right;
  }
  .pct-input:focus { border-color: var(--accent); }
  .pct-total { font-size: 0.72rem; font-family: 'Roboto Mono', monospace; margin-top: 6px; }

  .submit-btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    background: var(--accent); color: #0a0a0f;
    font-family: 'Roboto', sans-serif; font-size: 0.9rem; font-weight: 700;
    cursor: pointer; transition: opacity 0.15s; letter-spacing: 0.02em; margin-top: 6px;
  }
  body.light .submit-btn { color: #fff; }
  .submit-btn:active { opacity: 0.8; }

  .danger-btn {
    padding: 6px 12px; border: 1px solid rgba(248,113,113,0.3); border-radius: 7px;
    background: transparent; color: var(--red);
    font-family: 'Roboto', sans-serif; font-size: 0.7rem; font-weight: 500; cursor: pointer;
  }

  .empty { text-align: center; color: var(--muted); padding: 40px 16px; font-size: 0.85rem; }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 18px; font-size: 0.82rem; font-weight: 500;
    opacity: 0; transition: all 0.25s; z-index: 999; white-space: nowrap; pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,10,0.75); backdrop-filter: blur(4px);
    padding: 24px 16px; overflow-y: auto;
  }
  body.light .modal-overlay { background: rgba(0,0,0,0.4); }
  .modal-overlay.open { display: flex; align-items: flex-start; justify-content: center; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 20px; width: 100%; max-width: 480px; margin: auto;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .modal-title { font-size: 1rem; font-weight: 700; }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; padding: 4px; }

  select.form-input { cursor: pointer; }
  option { background: var(--surface2); }

  .section-title { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }

  .action-row { display: flex; gap: 8px; margin-bottom: 16px; }
  .action-btn {
    flex: 1; padding: 9px; border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); color: var(--text);
    font-family: 'Roboto', sans-serif; font-size: 0.75rem; font-weight: 500;
    cursor: pointer; text-align: center;
  }
  .action-btn:active { border-color: var(--accent); color: var(--accent); }

  /* ── SETTINGS ROWS ── */
  .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 0.88rem; font-weight: 500; }
  .setting-sub { font-size: 0.72rem; color: var(--muted); margin-top: 1px; }

  /* Toggle switch */
  .toggle { position: relative; width: 44px; height: 24px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0; border-radius: 24px;
    background: var(--border); cursor: pointer; transition: 0.2s;
  }
  .toggle-slider:before {
    content: ''; position: absolute; width: 18px; height: 18px;
    left: 3px; top: 3px; border-radius: 50%; background: white; transition: 0.2s;
  }
  input:checked + .toggle-slider { background: var(--accent); }
  input:checked + .toggle-slider:before { transform: translateX(20px); }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Portfolio <span>Tracker</span></h1>
    <div class="header-actions">
      <button class="icon-btn theme-toggle" onclick="toggleTheme()" title="Toggle theme" id="theme-btn">☀️</button>
      <button class="icon-btn" onclick="openSettings()" title="Settings">⚙</button>
    </div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="showTab('overview')">Overview</button>
      <button class="nav-tab" onclick="showTab('stocks')">Stocks</button>
      <button class="nav-tab" onclick="showTab('transactions')">Transactions</button>
      <button class="nav-tab" onclick="showTab('add')">+ Add</button>
    </div>
  </header>
  <main id="main-content"></main>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Settings</span>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
const STORAGE_KEY = 'portfolio_v3';
const TX_COST = 1.5;

let state = {
  owners: ['Murat', 'Yusuf', 'Cüneyt'],
  transactions: [],
  theme: 'dark'
};

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = { ...state, ...JSON.parse(raw) };
    if (!state.owners) state.owners = ['Murat', 'Yusuf', 'Cüneyt'];
    if (!state.transactions) state.transactions = [];
    if (!state.theme) state.theme = 'dark';
  } catch(e) {}
  applyTheme();
}

function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }

function applyTheme() {
  if (state.theme === 'light') {
    document.body.classList.add('light');
    document.getElementById('theme-btn').textContent = '🌙';
  } else {
    document.body.classList.remove('light');
    document.getElementById('theme-btn').textContent = '☀️';
  }
}

function toggleTheme() {
  state.theme = state.theme === 'dark' ? 'light' : 'dark';
  saveState();
  applyTheme();
}

// ══════════════════════════════════════════════
// CALCULATIONS
// ══════════════════════════════════════════════

// ── CORE ENGINE ──────────────────────────────────────────────────────────────
// Single source of truth for all calculations.
// The $1.50 fee is a flat cost per transaction, shared proportionally.
// For an owner with fraction F of a transaction:
//   Buy:  owner pays  (qty * price + 1.50) * F
//   Sell: owner gets  (qty * price - 1.50) * F
// This keeps cash-flow and P&L perfectly consistent.
// ─────────────────────────────────────────────────────────────────────────────

// Replay all (or filtered) transactions and return per-owner state.
// ownerFilter: string → only that owner's proportional slice
//              null   → aggregate full-portfolio view (fractions sum to whole)
// upToDate:    ISO date string → only include txs strictly before this date
//              null            → include all txs
function _replayTxs(ownerFilter, upToDate) {
  // Use original array index as tiebreaker so same-day transactions
  // are always processed in the order you entered them.
  const indexMap = new Map(state.transactions.map((tx, i) => [tx.id, i]));

  const txs = [...state.transactions]
    .filter(tx => !upToDate || new Date(tx.date) < new Date(upToDate))
    .sort((a, b) => {
      const dateDiff = new Date(a.date) - new Date(b.date);
      if (dateDiff !== 0) return dateDiff;
      return (indexMap.get(a.id) ?? 0) - (indexMap.get(b.id) ?? 0);
    });

  let cash = 0, deposits = 0, withdrawals = 0;
  // positions[ticker] = array of FIFO lots { qty, unitCost }
  const positions = {};
  // realized P&L per ticker
  const realized = {};

  for (const tx of txs) {
    // fraction: how much of this transaction belongs to the view we're calculating
    const frac = ownerFilter
      ? (tx.shares ? (tx.shares[ownerFilter] || 0) / 100 : 0)
      : 1; // full transaction for portfolio view

    if (frac === 0) continue;

    if (tx.type === 'deposit') {
      const amt = tx.amount * frac;
      cash += amt; deposits += amt;

    } else if (tx.type === 'withdraw') {
      const amt = tx.amount * frac;
      cash -= amt; withdrawals += amt;

    } else if (tx.type === 'buy') {
      // Total cost = (gross + fee) * fraction
      const gross = tx.qty * tx.price;
      const totalCost = (gross + TX_COST) * frac;
      const qty = tx.qty * frac;
      cash -= totalCost;
      if (!positions[tx.ticker]) positions[tx.ticker] = [];
      positions[tx.ticker].push({ qty, unitCost: qty > 0 ? totalCost / qty : 0 });
      if (!realized[tx.ticker]) realized[tx.ticker] = 0;

    } else if (tx.type === 'sell') {
      // Revenue = (gross - fee) * fraction
      const gross = tx.qty * tx.price;
      const revenue = (gross - TX_COST) * frac;
      const sellQty = tx.qty * frac;
      cash += revenue;

      // FIFO: match sell qty against buy lots to compute realized P&L
      if (!realized[tx.ticker]) realized[tx.ticker] = 0;
      if (!positions[tx.ticker]) positions[tx.ticker] = [];
      let rem = sellQty, costBasis = 0;
      while (rem > 0.00000001 && positions[tx.ticker].length > 0) {
        const lot = positions[tx.ticker][0];
        const use = Math.min(rem, lot.qty);
        costBasis += use * lot.unitCost;
        lot.qty -= use; rem -= use;
        if (lot.qty < 0.00000001) positions[tx.ticker].shift();
      }
      realized[tx.ticker] += revenue - costBasis;
    }
  }

  // Summarise open positions
  const openPositions = {};
  for (const [ticker, lots] of Object.entries(positions)) {
    const qty = lots.reduce((s, l) => s + l.qty, 0);
    const totalCost = lots.reduce((s, l) => s + l.qty * l.unitCost, 0);
    if (qty > 0.00000001) {
      openPositions[ticker] = { qty, avgCost: qty > 0 ? totalCost / qty : 0, totalCost };
    }
  }

  const openCost = Object.values(openPositions).reduce((s, p) => s + p.totalCost, 0);

  return { cash, deposits, withdrawals, openCost, openPositions, realized };
}

// Public helpers used by the UI
function calcStockPositions(ownerFilter) {
  const { realized, openPositions } = _replayTxs(ownerFilter, null);

  const result = {};
  const allTickers = new Set([...Object.keys(realized), ...Object.keys(openPositions)]);
  for (const ticker of allTickers) {
    const open = openPositions[ticker];
    result[ticker] = {
      qty:         open ? open.qty     : 0,
      avgCost:     open ? open.avgCost : 0,
      totalCost:   open ? open.totalCost : 0,
      realizedPnL: realized[ticker] || 0,
      open:        !!open,
      txCount:     state.transactions.filter(tx =>
                     tx.ticker === ticker &&
                     (tx.type === 'buy' || tx.type === 'sell')).length
    };
  }
  return result;
}

function calcOwnerBalance(ownerName) {
  return _replayTxs(ownerName, null);
}

function calcOwnerBalanceAtDate(ownerName, beforeDate) {
  const { cash, openCost } = _replayTxs(ownerName, beforeDate);
  return cash + openCost;
}

function totalPnL(ownerFilter) {
  const { realized } = _replayTxs(ownerFilter, null);
  return Object.values(realized).reduce((s, v) => s + v, 0);
}

// ══════════════════════════════════════════════
// TABS
// ══════════════════════════════════════════════
let currentTab = 'overview';
let selectedOwner = null;

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-tab').forEach((el, i) => {
    el.classList.toggle('active', ['overview','stocks','transactions','add'][i] === tab);
  });
  renderMain();
}

function renderMain() {
  const el = document.getElementById('main-content');
  if (currentTab === 'overview') el.innerHTML = renderOverview();
  else if (currentTab === 'stocks') el.innerHTML = renderStocks();
  else if (currentTab === 'transactions') el.innerHTML = renderTransactions();
  else if (currentTab === 'add') el.innerHTML = renderAddForm();
}

function ownerPills() {
  return `<div class="owner-pills">
    ${[null, ...state.owners].map(o => `<button class="pill ${selectedOwner===o?'active':''}" onclick="selectOwner(${o===null?'null':`'${o}'`})">${o||'All'}</button>`).join('')}
  </div>`;
}

function selectOwner(o) { selectedOwner = o; renderMain(); }

// ══════════════════════════════════════════════
// OVERVIEW
// ══════════════════════════════════════════════
function renderOverview() {
  let totalDeposits = 0, totalFinal = 0, totalPnLAll = 0;

  const tableRows = state.owners.map(o => {
    const b = calcOwnerBalance(o);
    const pnl = totalPnL(o);
    const net = b.deposits - b.withdrawals;
    // Final Balance = free cash + cost basis of open holdings
    // This equals: deposits - withdrawals - buySpend + sellRevenue + openPositionsCostBasis
    const finalBal = b.cash + b.openCost;
    totalDeposits += net; totalFinal += finalBal; totalPnLAll += pnl;
    const pnlCls = pnl >= 0 ? 'pos' : 'neg';
    const finalCls = finalBal >= 0 ? 'pos' : 'neg';
    const sign = pnl >= 0 ? '+' : '';
    return `<tr>
      <td>${o}</td>
      <td>${fmt(net)}</td>
      <td class="${pnlCls}">${sign}${fmt(pnl)}</td>
      <td class="${finalCls}">${fmt(finalBal)}</td>
    </tr>`;
  }).join('');

  const shownB = selectedOwner ? calcOwnerBalance(selectedOwner) : null;
  const shownDeposits = selectedOwner ? shownB.deposits - shownB.withdrawals : totalDeposits;
  const shownPnL = selectedOwner ? totalPnL(selectedOwner) : totalPnLAll;
  const shownFinal = selectedOwner ? shownB.cash + shownB.openCost : totalFinal;
  const pnlClass = shownPnL >= 0 ? 'pos' : 'neg';
  const pnlSign = shownPnL >= 0 ? '+' : '';
  const finalCls2 = shownFinal >= 0 ? 'pos' : 'neg';

  const recent = [...state.transactions].sort((a,b) => new Date(b.date)-new Date(a.date)).slice(0,5);
  const recentHTML = recent.length === 0
    ? '<div class="empty">No transactions yet. Go to "+ Add" to get started.</div>'
    : recent.map(tx => txCard(tx)).join('');

  return `
    ${ownerPills()}
    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-label">Realized P&amp;L</div>
        <div class="stat-val ${pnlClass}">${pnlSign}${fmt(shownPnL)}</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Final Balance</div>
        <div class="stat-val ${finalCls2}">${fmt(shownFinal)}</div>
      </div>
    </div>

    <div class="card" style="padding:0;overflow:hidden;margin-bottom:12px">
      <table class="owner-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Deposit</th>
            <th>Profit/Loss</th>
            <th>Final</th>
          </tr>
        </thead>
        <tbody>
          ${tableRows}
          <tr class="total-row">
            <td>Total</td>
            <td>${fmt(totalDeposits)}</td>
            <td class="${totalPnLAll>=0?'pos':'neg'}">${totalPnLAll>=0?'+':''}${fmt(totalPnLAll)}</td>
            <td class="${totalFinal>=0?'pos':'neg'}">${fmt(totalFinal)}</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="section-title" style="margin-bottom:10px">Recent Activity</div>
    ${recentHTML}
  `;
}

// ══════════════════════════════════════════════
// STOCKS
// ══════════════════════════════════════════════
function renderStocks() {
  const positions = calcStockPositions(selectedOwner);
  const tickers = Object.keys(positions);
  if (tickers.length === 0) return ownerPills() + '<div class="empty">No stock transactions yet.<br>Go to "+ Add" to add one.</div>';

  const open = tickers.filter(t => positions[t].open);
  const closed = tickers.filter(t => !positions[t].open);

  const stockCard = (ticker) => {
    const p = positions[ticker];
    const pnlClass = p.realizedPnL >= 0 ? 'pos' : 'neg';
    const sign = p.realizedPnL >= 0 ? '+' : '';
    return `<div class="stock-item">
      <div class="stock-top">
        <span class="stock-name">${ticker} ${p.open ? '<span style="font-size:0.62rem;color:var(--accent);background:rgba(110,231,183,0.1);padding:2px 6px;border-radius:4px;font-weight:700">OPEN</span>' : ''}</span>
        <span class="stock-pnl ${pnlClass}">${sign}${fmt(p.realizedPnL)}</span>
      </div>
      <div class="stock-detail">
        ${p.open ? `
          <div class="sdet">Qty Held<span>${p.qty.toFixed(8)}</span></div>
          <div class="sdet">Avg Cost<span>$${p.avgCost.toFixed(3)}</span></div>
          <div class="sdet">Cost Basis<span>${fmt(p.totalCost)}</span></div>`
        : `<div class="sdet">Status<span style="color:var(--muted)">Closed</span></div>
          <div class="sdet">Realized<span class="${pnlClass}">${sign}${fmt(p.realizedPnL)}</span></div>
          <div class="sdet">Transactions<span>${p.txCount}</span></div>`}
      </div>
    </div>`;
  };

  return `
    ${ownerPills()}
    ${open.length > 0 ? `<div class="section-title">Open Positions (${open.length})</div>${open.map(stockCard).join('')}` : ''}
    ${closed.length > 0 ? `<div class="section-title" style="margin-top:${open.length?'14px':'0'}">Closed Positions (${closed.length})</div>${closed.map(stockCard).join('')}` : ''}
  `;
}

// ══════════════════════════════════════════════
// TRANSACTIONS
// ══════════════════════════════════════════════
function renderTransactions() {
  const txs = [...state.transactions].sort((a,b) => new Date(b.date)-new Date(a.date));
  if (txs.length === 0) return ownerPills() + '<div class="empty">No transactions yet.</div>';

  const filtered = selectedOwner
    ? txs.filter(tx => tx.shares && (tx.shares[selectedOwner]||0) > 0 || tx.type==='deposit' || tx.type==='withdraw')
    : txs;

  return `
    ${ownerPills()}
    <div class="action-row">
      <button class="action-btn" onclick="exportCSV()">⬇ Export CSV</button>
      <button class="action-btn" onclick="clearAll()">🗑 Clear All</button>
    </div>
    <div class="section-title">${filtered.length} transactions</div>
    ${filtered.map(tx => txCard(tx, true)).join('')}
  `;
}

function txCard(tx, showDelete = false) {
  const typeMap = { buy:'BUY', sell:'SELL', deposit:'DEP', withdraw:'WIT' };
  const badgeClass = { buy:'buy', sell:'sell', deposit:'dep', withdraw:'wit' };
  const amt = (tx.type==='deposit'||tx.type==='withdraw') ? tx.amount : tx.qty*tx.price;
  const netAmt = tx.type==='buy' ? amt+TX_COST : tx.type==='sell' ? amt-TX_COST : amt;
  const sign = (tx.type==='sell'||tx.type==='deposit') ? '+' : '-';
  const amtClass = (tx.type==='sell'||tx.type==='deposit') ? 'pos' : tx.type==='buy' ? 'neg' : 'neu';
  const ownersStr = tx.shares ? state.owners.filter(o => (tx.shares[o]||0)>0).map(o => `${o} ${tx.shares[o]}%`).join(' · ') : '';

  return `<div class="tx-item">
    <div class="tx-badge ${badgeClass[tx.type]}">${typeMap[tx.type]}</div>
    <div class="tx-info">
      <div class="tx-top">
        <span class="tx-name">${tx.ticker||'Cash'}</span>
        <span class="tx-amount ${amtClass}">${sign}${fmt(netAmt)}</span>
      </div>
      <div class="tx-meta">${tx.date}${tx.qty ? ` · ${tx.qty} @ $${tx.price}` : ''} · $${TX_COST} fee</div>
      ${tx.note ? `<div class="tx-meta" style="color:var(--muted)">${tx.note}</div>` : ''}
      ${ownersStr ? `<div class="tx-owners">${ownersStr}</div>` : ''}
    </div>
    ${showDelete ? `<button class="danger-btn" onclick="deleteTx('${tx.id}')">✕</button>` : ''}
  </div>`;
}

// ══════════════════════════════════════════════
// ADD FORM
// ══════════════════════════════════════════════
let formState = {
  type: 'buy', ticker: '', qty: '', price: '', amount: '',
  date: new Date().toISOString().slice(0,10), note: '',
  ownerShares: {}
};

function resetForm() {
  formState.type = 'buy'; formState.ticker = ''; formState.qty = ''; formState.price = '';
  formState.amount = ''; formState.date = new Date().toISOString().slice(0,10);
  formState.note = ''; formState.ownerShares = {};
  state.owners.forEach(o => { formState.ownerShares[o] = ''; });
}

function renderAddForm() {
  state.owners.forEach(o => { if (formState.ownerShares[o] === undefined) formState.ownerShares[o] = ''; });
  const isCash = formState.type==='deposit' || formState.type==='withdraw';
  const pctTotal = state.owners.reduce((s,o) => s+(parseFloat(formState.ownerShares[o])||0), 0);
  const pctOk = Math.abs(pctTotal-100) < 0.01;

  let tickerSection = '';
  if (!isCash) {
    if (formState.type === 'sell') {
      const positions = calcStockPositions(null);
      const openTickers = Object.keys(positions).filter(t => positions[t].open);
      if (openTickers.length === 0) {
        tickerSection = `<div class="form-section">
          <label class="form-label">Ticker Symbol</label>
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:0.82rem;color:var(--muted)">No open positions to sell</div>
        </div>`;
      } else {
        tickerSection = `<div class="form-section">
          <label class="form-label">Ticker Symbol</label>
          <select class="form-input" onchange="onSellTickerChange(this.value)">
            <option value="">— Select ticker —</option>
            ${openTickers.map(t => {
              const p = positions[t];
              return `<option value="${t}" ${formState.ticker===t?'selected':''}>${t} · ${p.qty.toFixed(8)} held · avg $${p.avgCost.toFixed(3)}</option>`;
            }).join('')}
          </select>
          ${formState.ticker ? `<div style="font-size:0.7rem;color:var(--accent);margin-top:5px;font-family:'Roboto Mono',monospace">
            In hand: ${positions[formState.ticker]?.qty.toFixed(8)||'—'} shares · cost basis ${fmt(positions[formState.ticker]?.totalCost||0)}
          </div>` : ''}
        </div>`;
      }
    } else {
      tickerSection = `<div class="form-section">
        <label class="form-label">Ticker Symbol</label>
        <input class="form-input" type="text" placeholder="e.g. RKLB" value="${formState.ticker}"
          oninput="formState.ticker=this.value.toUpperCase();this.value=formState.ticker" style="text-transform:uppercase" />
      </div>`;
    }
  }

  // Gross amount preview
  const grossPreview = (!isCash && formState.qty && formState.price)
    ? `<div style="font-size:0.7rem;color:var(--muted);margin-top:4px;font-family:'Roboto Mono',monospace">
        Gross: $${(parseFloat(formState.qty)*parseFloat(formState.price)).toFixed(2)} · Fee: $${TX_COST.toFixed(2)} · Net: $${(parseFloat(formState.qty)*parseFloat(formState.price)+(formState.type==='buy'?TX_COST:-TX_COST)).toFixed(2)}
      </div>` : '';

  return `
    <div class="form-section">
      <label class="form-label">Transaction Type</label>
      <div class="type-btns">
        <button class="type-btn ${formState.type==='buy'?'active-buy':''}" onclick="setType('buy')">Buy</button>
        <button class="type-btn ${formState.type==='sell'?'active-sell':''}" onclick="setType('sell')">Sell</button>
        <button class="type-btn ${formState.type==='deposit'?'active-dep':''}" onclick="setType('deposit')">Deposit</button>
        <button class="type-btn ${formState.type==='withdraw'?'active-wit':''}" onclick="setType('withdraw')">Withdraw</button>
      </div>
    </div>

    ${tickerSection}

    ${!isCash ? `
    <div class="form-row form-section">
      <div>
        <label class="form-label">Quantity <span style="font-weight:400;opacity:0.6">(8 dec.)</span></label>
        <input class="form-input" type="number" step="0.00000001" inputmode="decimal" placeholder="0.00000000"
          value="${formState.qty}" oninput="formState.qty=this.value;updateGrossPreview()" />
      </div>
      <div>
        <label class="form-label">Price ($) <span style="font-weight:400;opacity:0.6">(3 dec.)</span></label>
        <input class="form-input" type="number" step="0.001" inputmode="decimal" placeholder="0.000"
          value="${formState.price}" oninput="formState.price=this.value;updateGrossPreview()" />
      </div>
    </div>
    <div id="gross-preview">${grossPreview}</div>
    ` : `
    <div class="form-section">
      <label class="form-label">Amount ($)</label>
      <input class="form-input" type="number" step="any" inputmode="decimal" placeholder="0.00"
        value="${formState.amount}" oninput="formState.amount=this.value" />
    </div>
    `}

    <div class="form-section">
      <label class="form-label">Date</label>
      <input class="form-input" type="date" value="${formState.date}" oninput="formState.date=this.value" />
    </div>

    <div class="form-section">
      <label class="form-label">Owner Shares (%)</label>
      <div class="pct-row">
        ${state.owners.map(o => `
          <div class="pct-input-wrap">
            <span class="pct-label">${o}</span>
            <input class="pct-input" type="number" min="0" max="100" step="any"
              placeholder="0" value="${formState.ownerShares[o]||''}"
              oninput="formState.ownerShares['${o}']=this.value;updatePctTotal()" />
            <span style="font-size:0.72rem;color:var(--muted)">%</span>
          </div>
        `).join('')}
      </div>
      <div class="pct-total ${pctOk?'pos':pctTotal>0?'neg':'neu'}" id="pct-total">
        Total: ${pctTotal.toFixed(1)}% ${pctOk?'✓':pctTotal>0?'(must equal 100%)':''}
      </div>
      <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap">
        <button class="type-btn" onclick="setProportionalSplit()" style="flex:none;padding:5px 10px;font-size:0.7rem">⚖ By Balance</button>
        <button class="type-btn" onclick="clearShares()" style="flex:none;padding:5px 10px;font-size:0.7rem">Clear</button>
      </div>
    </div>

    <div class="form-section">
      <label class="form-label">Note (optional)</label>
      <input class="form-input" type="text" placeholder="Optional note" value="${formState.note}"
        oninput="formState.note=this.value" />
    </div>

    <button class="submit-btn" onclick="submitTransaction()">Add Transaction</button>
    <button class="type-btn" onclick="resetForm();renderMain()" style="width:100%;margin-top:8px;padding:9px">Reset</button>
  `;
}

function updateGrossPreview() {
  const el = document.getElementById('gross-preview');
  if (!el) return;
  const qty = parseFloat(formState.qty), price = parseFloat(formState.price);
  if (qty > 0 && price > 0) {
    const gross = qty * price;
    const net = gross + (formState.type==='buy' ? TX_COST : -TX_COST);
    el.innerHTML = `<div style="font-size:0.7rem;color:var(--muted);margin-top:4px;font-family:'Roboto Mono',monospace">
      Gross: $${gross.toFixed(2)} · Fee: $${TX_COST.toFixed(2)} · Net: $${net.toFixed(2)}
    </div>`;
  } else {
    el.innerHTML = '';
  }
}

function setType(t) {
  const prev = formState.type;
  formState.type = t;
  if ((prev==='sell') !== (t==='sell')) { formState.ticker=''; formState.qty=''; }
  renderMain();
}

function onSellTickerChange(ticker) {
  formState.ticker = ticker;
  if (ticker) {
    const positions = calcStockPositions(null);
    if (positions[ticker]) formState.qty = positions[ticker].qty.toFixed(8);
  } else {
    formState.qty = '';
  }
  renderMain();
}

function setProportionalSplit() {
  // Use total balance at the time of this transaction's date (current form date)
  const refDate = formState.date || new Date().toISOString().slice(0,10);
  // Add one day to include today's earlier transactions, but use strictly-before for new tx
  const balances = {};
  state.owners.forEach(o => {
    balances[o] = Math.max(0, calcOwnerBalanceAtDate(o, refDate));
  });
  const totalBal = Object.values(balances).reduce((s,v) => s+v, 0);

  if (totalBal <= 0) {
    // No prior balance — equal split
    const n = state.owners.length;
    state.owners.forEach(o => { formState.ownerShares[o] = (100/n).toFixed(5); });
    toast('No prior balance found — equal split applied');
  } else {
    let remaining = 100;
    state.owners.forEach((o, i) => {
      if (i === state.owners.length - 1) {
        formState.ownerShares[o] = remaining.toFixed(5);
      } else {
        const pct = parseFloat(((balances[o] / totalBal) * 100).toFixed(5));
        formState.ownerShares[o] = String(pct);
        remaining -= pct;
      }
    });
    const hint = state.owners.map(o => `${o}: ${parseFloat(formState.ownerShares[o]).toFixed(1)}%`).join(' · ');
    toast('Split by balance: ' + hint);
  }
  renderMain();
}

function clearShares() {
  state.owners.forEach(o => { formState.ownerShares[o] = ''; });
  renderMain();
}

function updatePctTotal() {
  const total = state.owners.reduce((s,o) => s+(parseFloat(formState.ownerShares[o])||0), 0);
  const el = document.getElementById('pct-total');
  if (!el) return;
  const ok = Math.abs(total-100) < 0.01;
  el.textContent = `Total: ${total.toFixed(1)}% ${ok?'✓':total>0?'(must equal 100%)':''}`;
  el.className = `pct-total ${ok?'pos':total>0?'neg':'neu'}`;
}

function submitTransaction() {
  const t = formState.type;
  const isCash = t==='deposit' || t==='withdraw';
  if (!isCash) {
    if (!formState.ticker.trim()) { toast('Enter a ticker symbol'); return; }
    if (!formState.qty || parseFloat(formState.qty) <= 0) { toast('Enter quantity'); return; }
    if (!formState.price || parseFloat(formState.price) <= 0) { toast('Enter price'); return; }
  } else {
    if (!formState.amount || parseFloat(formState.amount) <= 0) { toast('Enter amount'); return; }
  }
  if (!formState.date) { toast('Enter a date'); return; }
  const total = state.owners.reduce((s,o) => s+(parseFloat(formState.ownerShares[o])||0), 0);
  if (Math.abs(total-100) > 0.1) { toast('Owner shares must total 100%'); return; }

  const shares = {};
  state.owners.forEach(o => { shares[o] = parseFloat(formState.ownerShares[o])||0; });

  const tx = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    type: t, date: formState.date,
    ticker: isCash ? '' : formState.ticker.trim().toUpperCase(),
    qty: isCash ? 0 : parseFloat(formState.qty),
    price: isCash ? 0 : parseFloat(formState.price),
    amount: isCash ? parseFloat(formState.amount) : 0,
    note: formState.note.trim(), shares
  };

  state.transactions.push(tx);
  saveState();
  toast('Transaction added ✓');
  resetForm();
  renderMain();
}

function deleteTx(id) {
  if (!confirm('Delete this transaction?')) return;
  state.transactions = state.transactions.filter(tx => tx.id !== id);
  saveState(); renderMain();
}

function clearAll() {
  if (!confirm('Delete ALL transactions? This cannot be undone.')) return;
  state.transactions = []; saveState(); renderMain();
}

// ══════════════════════════════════════════════
// EXPORT
// ══════════════════════════════════════════════
function exportCSV() {
  const rows = [['Date','Type','Ticker','Qty','Price','Fee','Net',...state.owners,'Note']];
  for (const tx of [...state.transactions].sort((a,b)=>new Date(a.date)-new Date(b.date))) {
    const gross = tx.qty*tx.price;
    const net = tx.type==='buy' ? gross+TX_COST : tx.type==='sell' ? gross-TX_COST : tx.amount;
    rows.push([tx.date,tx.type,tx.ticker,tx.qty||'',tx.price||'',TX_COST,net.toFixed(2),
      ...state.owners.map(o=>(tx.shares?.[o]||0)+'%'),tx.note]);
  }
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download = 'portfolio_export.csv'; a.click();
  toast('CSV downloaded ✓');
}

// ══════════════════════════════════════════════
// SETTINGS
// ══════════════════════════════════════════════
function openSettings() {
  document.getElementById('modal-title').textContent = 'Settings';
  document.getElementById('modal-body').innerHTML = `
    <div style="margin-bottom:16px">
      <div class="section-title">Appearance</div>
      <div class="setting-row">
        <div>
          <div class="setting-label">Light Theme</div>
          <div class="setting-sub">Switch between dark and light mode</div>
        </div>
        <label class="toggle">
          <input type="checkbox" ${state.theme==='light'?'checked':''} onchange="toggleThemeFromSettings(this.checked)" />
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <div class="section-title">Owners</div>
    <div id="owners-list">
      ${state.owners.map((o,i) => `
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
          <input class="form-input" type="text" value="${o}" oninput="state.owners[${i}]=this.value" style="flex:1" />
          ${state.owners.length > 1 ? `<button class="danger-btn" onclick="removeOwner(${i})">✕</button>` : ''}
        </div>
      `).join('')}
    </div>
    <button class="action-btn" onclick="addOwner()" style="width:100%;margin-top:4px;margin-bottom:16px">+ Add Owner</button>
    <button class="submit-btn" onclick="saveOwners()">Save</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function toggleThemeFromSettings(checked) {
  state.theme = checked ? 'light' : 'dark';
  saveState(); applyTheme();
}

function addOwner() { state.owners.push('New'); openSettings(); }
function removeOwner(i) { state.owners.splice(i,1); openSettings(); }

function saveOwners() {
  state.owners = state.owners.map(o=>o.trim()).filter(Boolean);
  saveState(); closeModal(); renderMain();
  toast('Owners saved ✓');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }

// ══════════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════════
function fmt(n) {
  const s = Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  return (n<0?'-':'')+'$'+s;
}

function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 2200);
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════
loadState();
resetForm();
state.owners.forEach(o => { if (!formState.ownerShares[o]) formState.ownerShares[o]=''; });
renderMain();
</script>
